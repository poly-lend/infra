services:
  mongo:
    image: mongo:8
    container_name: polylend-mongo
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' | grep -q 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mongo-backup:
    image: mongo:8
    container_name: polylend-mongo-backup
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./data/backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          STAMP=$$(date +%Y-%m-%d_%H%M)
          echo "Starting backup $$STAMP"
          mongodump --host mongo --archive=/backups/$$STAMP.gz --gzip \
            && echo "Backup complete: $$STAMP" \
            || echo "Backup failed: $$STAMP"
          find /backups -name '*.gz' -mtime +14 -delete
          sleep 86400
        done
    restart: unless-stopped

  anvil:
    image: ghcr.io/foundry-rs/foundry:stable
    container_name: polylend-anvil
    environment:
      - RPC_URL=${RPC_URL}
      - STATE_FILE=/data/anvil-state.json
      - DUMP_INTERVAL_SECS=600
      - FOUNDRY_DISABLE_NIGHTLY_WARNING=1
    entrypoint: ["/bin/sh", "/anvil-entrypoint.sh"]
    volumes:
      - ./data/anvil:/data
      - ./scripts/anvil-entrypoint.sh:/anvil-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "cast chain-id --rpc-url http://localhost:8545 | grep -q 31337"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 30s
    restart: unless-stopped

  # One-shot service that deploys PolyLend against the anvil fork and publishes
  # the resulting deployment metadata to the testnet_deployments named volume.
  # listener-testnet and api-testnet mount that volume read-only and resolve
  # POLYLEND_ADDRESS / START_BLOCK from the JSON at startup.
  testnet-deploy:
    image: ghcr.io/foundry-rs/foundry:stable
    container_name: polylend-testnet-deploy
    depends_on:
      anvil:
        condition: service_healthy
    user: "1001:1001"
    environment:
      - FOUNDRY_DISABLE_NIGHTLY_WARNING=1
      - HOME=/tmp
    volumes:
      - ../contracts:/work
      - ./data/testnet-deployments:/deployments
    working_dir: /work
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        mkdir -p deployments
        forge script script/DeployTestnet.s.sol --rpc-url http://anvil:8545 --broadcast
        cp deployments/testnet.json /deployments/testnet.json
        echo "=== wrote /deployments/testnet.json ==="
        cat /deployments/testnet.json
    restart: "no"

  api:
    image: polylend-api
    container_name: polylend-api
    depends_on:
      mongo:
        condition: service_healthy
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongo:27017
    command: ['node', 'build/api.js']
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  api-testnet:
    image: polylend-api
    container_name: polylend-api-testnet
    depends_on:
      mongo:
        condition: service_healthy
      anvil:
        condition: service_healthy
      testnet-deploy:
        condition: service_completed_successfully
    environment:
      - NODE_ENV=production
      - NETWORK=testnet
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB=polylend-testnet
      - RPC_URL=http://anvil:8545
      - WS_URL=ws://anvil:8545
    volumes:
      - ./data/testnet-deployments:/deployments:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export POLYLEND_ADDRESS=$$(node -e "console.log(require('/deployments/testnet.json').polylend)")
        echo "Resolved POLYLEND_ADDRESS=$$POLYLEND_ADDRESS"
        exec node build/api.js
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  listener:
    image: polylend-listener
    container_name: polylend-listener
    depends_on:
      mongo:
        condition: service_healthy
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongo:27017
      - RPC_URL=${RPC_URL}
      - WS_URL=${WS_URL}
    command: ['node', 'build/listener.js']
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  listener-testnet:
    image: polylend-listener
    container_name: polylend-listener-testnet
    depends_on:
      mongo:
        condition: service_healthy
      anvil:
        condition: service_healthy
      testnet-deploy:
        condition: service_completed_successfully
    environment:
      - NODE_ENV=production
      - NETWORK=testnet
      - MONGO_URL=mongodb://mongo:27017
      - MONGO_DB=polylend-testnet
      - RPC_URL=http://anvil:8545
      - WS_URL=ws://anvil:8545
    volumes:
      - ./data/testnet-deployments:/deployments:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export POLYLEND_ADDRESS=$$(node -e "console.log(require('/deployments/testnet.json').polylend)")
        export START_BLOCK=$$(node -e "console.log(require('/deployments/testnet.json').deployedAtBlock)")
        echo "Resolved POLYLEND_ADDRESS=$$POLYLEND_ADDRESS START_BLOCK=$$START_BLOCK"
        exec node build/listener.js
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  web-build:
    image: polylend-web-build
    build:
      context: ../webapp
      dockerfile: Dockerfile
      args:
        - VITE_PUBLIC_POSTHOG_PROJECT_TOKEN=${VITE_PUBLIC_POSTHOG_PROJECT_TOKEN}
        - VITE_PUBLIC_POSTHOG_HOST=${VITE_PUBLIC_POSTHOG_HOST}
    volumes:
      - web_dist:/web

  web-testnet-build:
    image: polylend-web-testnet-build
    build:
      context: ../webapp
      dockerfile: Dockerfile
      args:
        - VITE_NETWORK=testnet
        - VITE_TESTNET_POLYLEND_ADDRESS=${TESTNET_POLYLEND_ADDRESS:-}
        - VITE_PUBLIC_POSTHOG_PROJECT_TOKEN=${VITE_PUBLIC_POSTHOG_PROJECT_TOKEN}
        - VITE_PUBLIC_POSTHOG_HOST=${VITE_PUBLIC_POSTHOG_HOST}
    volumes:
      - web_testnet_dist:/web

  landing-build:
    image: polylend-landing-build
    build:
      context: ../landing
      dockerfile: Dockerfile
      args:
        - VITE_PUBLIC_POSTHOG_PROJECT_TOKEN=${VITE_PUBLIC_POSTHOG_PROJECT_TOKEN}
        - VITE_PUBLIC_POSTHOG_HOST=${VITE_PUBLIC_POSTHOG_HOST}
    volumes:
      - landing_dist:/landing

  caddy:
    image: caddy
    container_name: polylend-caddy
    depends_on:
      web-build:
        condition: service_completed_successfully
      web-testnet-build:
        condition: service_completed_successfully
      landing-build:
        condition: service_completed_successfully
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - web_dist:/srv/web:ro
      - landing_dist:/srv/landing:ro
      - web_testnet_dist:/srv/web-testnet:ro
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  web_dist:
  landing_dist:
  web_testnet_dist:
